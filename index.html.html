<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Entry Picker</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #display { font-size: 1.2rem; min-height: 50px; }
    </style>
</head>
<body>

<div class="card">
    <div id="display">Loading entries...</div>
    <button onclick="pickRandom()">Show Random Entry</button>
</div>

<script>
    let allEntries = [];
    let history = [];
    const API_URL = 'https://script.google.com/macros/s/AKfycbwSzmf7YdxJY4HHSQSQyrk0tNZzyD9QGSpQq4fDbTNxfRCdY7Z6Ajem7SIpIcCZZ4rObw/exec';

    // 1. Fetch data from Google Sheet on load
    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            allEntries = await response.json();
            document.getElementById('display').innerText = "Ready!";
        } catch (error) {
            document.getElementById('display').innerText = "Error loading data.";
        }
    }

    // 2. The Logic
    function pickRandom() {
        if (allEntries.length === 0) return;

        // Filter out items that are in the history
        let availableEntries = allEntries.filter(entry => !history.includes(entry.rowId));

        // Safety check: if sheet is small or history is full, clear history
        if (availableEntries.length === 0) {
            history = [];
            availableEntries = allEntries;
        }

        // Select random
        const randomIndex = Math.floor(Math.random() * availableEntries.length);
        const selected = availableEntries[randomIndex];

        // 3. Update History (keep only last 100)
        history.push(selected.rowId);
        if (history.length > 100) {
            history.shift(); // Remove the oldest entry
        }

        // 4. Update UI (Assuming your sheet has a column named "Content")
        document.getElementById('display').innerText = selected.Content || JSON.stringify(selected);
    }

    fetchData();
</script>
</body>
</html>
